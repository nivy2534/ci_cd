apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: task-app
  template:
    metadata:
      labels:
        app: task-app
    spec:
      containers:
      - name: task-app-container
        image: username-docker-member2/python-app:latest 
        ports:
        - containerPort: 5000
        imagePullPolicy: Always
