<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager PAL</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: linear-gradient(
                135deg,
                #1E4FD1 0%,
                #0A2A8B 55%,
                #071F63 100%
            );

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);

            border-radius: 22px;

            box-shadow:
                0 12px 40px rgba(10, 42, 139, 0.35),
                0 0 25px rgba(30, 79, 209, 0.15);

            width: 100%;
            max-width: 620px;

            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;

            color: #0A2A8B;
            font-size: 2.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        #taskInput {
            flex: 1;

            padding: 14px 16px;

            border: 2px solid #dfe6ff;
            border-radius: 12px;

            font-size: 16px;

            transition: 0.25s;
        }

        #taskInput:focus {
            outline: none;

            border-color: #1E4FD1;

            box-shadow:
                0 0 0 5px rgba(30, 79, 209, 0.15);
        }

        button {
            border: none;

            padding: 14px 24px;

            border-radius: 12px;

            color: white;

            font-size: 15px;
            font-weight: 600;

            cursor: pointer;

            transition: 0.25s;

            background: linear-gradient(
                135deg,
                #3B6EFF 0%,
                #0A2A8B 100%
            );
        }

        button:hover {
            transform: translateY(-2px);

            box-shadow:
                0 8px 18px rgba(10, 42, 139, 0.35),
                0 0 10px rgba(30, 79, 209, 0.2);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;

            padding: 16px;

            margin-bottom: 14px;

            background: #f5f8ff;

            border-left: 5px solid #1E4FD1;
            border-radius: 14px;

            transition: 0.25s;
        }

        .task-item:hover {
            transform: translateX(6px);

            box-shadow:
                0 6px 18px rgba(10, 42, 139, 0.12);
        }

        .task-item.completed {
            background: #eaf0ff;
            border-left-color: #0A2A8B;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            opacity: 0.6;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;

            accent-color: #1E4FD1;

            cursor: pointer;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 8px 13px;
            border-radius: 10px;
            font-size: 13px;
        }

        .btn-edit {
            background: linear-gradient(
                135deg,
                #4A7BFF 0%,
                #1E4FD1 100%
            );
        }

        .btn-delete {
            background: linear-gradient(
                135deg,
                #ff5f6d 0%,
                #d63031 100%
            );
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #1E4FD1;
        }

        /* MODAL */

        .modal {
            display: none;

            position: fixed;
            inset: 0;

            background: rgba(0,0,0,0.5);

            justify-content: center;
            align-items: center;

            z-index: 999;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 430px;

            background: white;

            padding: 30px;

            border-radius: 20px;

            animation: popup 0.25s ease;
        }

        @keyframes popup {
            from {
                opacity: 0;
                transform: translateY(-25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 22px;
            font-weight: 700;

            color: #0A2A8B;

            margin-bottom: 20px;
        }

        .modal-body label {
            display: block;

            margin-bottom: 6px;

            font-weight: 500;
            color: #555;
        }

        .modal-body input,
        .modal-body textarea {
            width: 100%;

            padding: 12px;

            margin-bottom: 16px;

            border-radius: 12px;
            border: 2px solid #dfe6ff;

            font-size: 14px;

            transition: 0.25s;
        }

        .modal-body input:focus,
        .modal-body textarea:focus {
            outline: none;

            border-color: #1E4FD1;

            box-shadow:
                0 0 0 4px rgba(30, 79, 209, 0.12);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            background: #bdbdbd;
            color: #333;
        }

        .btn-save {
            background: linear-gradient(
                135deg,
                #3B6EFF 0%,
                #0A2A8B 100%
            );
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .input-group {
                flex-direction: column;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📝 Task Manager</h1>

        <div class="input-group">
            <input
                type="text"
                id="taskInput"
                placeholder="Add a new task..."
            />

            <button onclick="addTask()">
                Add
            </button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">✓</div>
            <p>No tasks yet! Start by adding one above.</p>
        </div>

    </div>

    <!-- EDIT MODAL -->

    <div id="editModal" class="modal">

        <div class="modal-content">

            <div class="modal-header">
                Edit Task
            </div>

            <div class="modal-body">

                <label>Title</label>

                <input
                    type="text"
                    id="editTitle"
                />

                <label>Description</label>

                <textarea
                    id="editDescription"
                    rows="4"
                ></textarea>

            </div>

            <div class="modal-footer">

                <button
                    class="btn-small btn-cancel"
                    onclick="closeEditModal()"
                >
                    Cancel
                </button>

                <button
                    class="btn-small btn-save"
                    onclick="saveEdit()"
                >
                    Save
                </button>

            </div>

        </div>

    </div>

    <script>

        let tasks = [];
        let editingTaskId = null;

        function renderTasks() {

            const taskList = document.getElementById("taskList");
            const emptyState = document.getElementById("emptyState");

            taskList.innerHTML = "";

            if (tasks.length === 0) {
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";

            tasks.forEach(task => {

                const li = document.createElement("li");

                li.className = `
                    task-item
                    ${task.completed ? "completed" : ""}
                `;

                li.innerHTML = `
                    <input
                        type="checkbox"
                        ${task.completed ? "checked" : ""}
                        onchange="toggleTask(${task.id})"
                    >

                    <div class="task-content">
                        <div class="task-title">
                            ${task.title}
                        </div>
                    </div>

                    <div class="task-actions">

                        <button
                            class="btn-small btn-edit"
                            onclick="openEditModal(${task.id})"
                        >
                            Edit
                        </button>

                        <button
                            class="btn-small btn-delete"
                            onclick="deleteTask(${task.id})"
                        >
                            Delete
                        </button>

                    </div>
                `;

                taskList.appendChild(li);
            });
        }

        function addTask() {

            const input = document.getElementById("taskInput");

            const title = input.value.trim();

            if (!title) {
                alert("Please enter a task!");
                return;
            }

            tasks.push({
                id: Date.now(),
                title: title,
                description: "",
                completed: false
            });

            input.value = "";

            renderTasks();
        }

        function deleteTask(id) {

            tasks = tasks.filter(
                task => task.id !== id
            );

            renderTasks();
        }

        function toggleTask(id) {

            tasks = tasks.map(task => {

                if (task.id === id) {
                    task.completed = !task.completed;
                }

                return task;
            });

            renderTasks();
        }

        function openEditModal(id) {

            const task = tasks.find(
                t => t.id === id
            );

            editingTaskId = id;

            document.getElementById("editTitle").value =
                task.title;

            document.getElementById("editDescription").value =
                task.description;

            document
                .getElementById("editModal")
                .classList.add("show");
        }

        function closeEditModal() {

            document
                .getElementById("editModal")
                .classList.remove("show");
        }

        function saveEdit() {

            const title =
                document.getElementById("editTitle")
                .value
                .trim();

            const description =
                document.getElementById("editDescription")
                .value
                .trim();

            if (!title) {
                alert("Title cannot be empty!");
                return;
            }

            tasks = tasks.map(task => {

                if (task.id === editingTaskId) {

                    task.title = title;
                    task.description = description;
                }

                return task;
            });

            closeEditModal();

            renderTasks();
        }

        document
            .getElementById("taskInput")
            .addEventListener("keypress", function(e) {

                if (e.key === "Enter") {
                    addTask();
                }
            });

        document
            .getElementById("editModal")
            .addEventListener("click", function(e) {

                if (e.target === this) {
                    closeEditModal();
                }
            });

        renderTasks();

    </script>

</body>
</html>
