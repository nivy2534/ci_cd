<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #taskInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .task-item:hover {
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .task-item.completed {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 16px;
            color: #333;
            font-weight: 500;
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-edit {
            background: #2196F3;
            color: white;
        }

        .btn-edit:hover {
            background: #1976D2;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }

        .modal-body input,
        .modal-body textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        .modal-body textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-body input:focus,
        .modal-body textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .btn-save {
            background: #4caf50;
            color: white;
        }

        .btn-save:hover {
            background: #45a049;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .input-group {
                flex-direction: column;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Task Manager</h1>

        <div class="input-group">
            <input id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">✓</div>
            <p>No tasks yet! Start by adding one above.</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Edit Task</div>
            <div class="modal-body">
                <label for="editTitle">Title</label>
                <input id="editTitle" type="text" placeholder="Task title">
                <label for="editDescription">Description</label>
                <textarea id="editDescription" placeholder="Task description"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-small btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-small btn-save" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let editingTaskId = null;

        async function loadTasks() {
            try {
                const res = await fetch("/api/tasks");
                if (!res.ok) throw new Error("Failed to load tasks");
                
                const data = await res.json();
                const list = document.getElementById("taskList");
                const emptyState = document.getElementById("emptyState");
                
                list.innerHTML = "";

                if (data.length === 0) {
                    emptyState.style.display = "block";
                } else {
                    emptyState.style.display = "none";
                    data.forEach(task => {
                        const li = document.createElement("li");
                        li.className = `task-item ${task.status === 'completed' ? 'completed' : ''}`;
                        li.innerHTML = `
                            <input type="checkbox" ${task.status === 'completed' ? 'checked' : ''} 
                                   onchange="toggleStatus(${task.id}, this.checked)">
                            <div class="task-content">
                                <div class="task-title">${escapeHtml(task.title)}</div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-small btn-edit" onclick="openEditModal(${task.id}, '${escapeHtml(task.title)}', '${escapeHtml(task.description || '')}')">Edit</button>
                                <button class="btn-small btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                            </div>
                        `;
                        list.appendChild(li);
                    });
                }
            } catch (error) {
                console.error("Error loading tasks:", error);
                alert("Error loading tasks. Please try again.");
            }
        }

        async function addTask() {
            const input = document.getElementById("taskInput");
            if (input.value.trim() === "") {
                alert("Please enter a task title");
                return;
            }

            try {
                const res = await fetch("/api/tasks", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({title: input.value.trim(), description: ""})
                });

                if (!res.ok) throw new Error("Failed to add task");
                
                input.value = "";
                loadTasks();
            } catch (error) {
                console.error("Error adding task:", error);
                alert("Error adding task. Please try again.");
            }
        }

        async function deleteTask(taskId) {
            if (!confirm("Are you sure you want to delete this task?")) return;

            try {
                const res = await fetch(`/api/tasks/${taskId}`, {method: "DELETE"});
                if (!res.ok) throw new Error("Failed to delete task");
                loadTasks();
            } catch (error) {
                console.error("Error deleting task:", error);
                alert("Error deleting task. Please try again.");
            }
        }

        async function toggleStatus(taskId, isChecked) {
            try {
                const res = await fetch(`/api/tasks/${taskId}/status`, {
                    method: "PATCH",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({status: isChecked ? "completed" : "pending"})
                });
                if (!res.ok) throw new Error("Failed to update status");
                loadTasks();
            } catch (error) {
                console.error("Error updating status:", error);
                alert("Error updating task status. Please try again.");
            }
        }

        function openEditModal(taskId, title, description) {
            editingTaskId = taskId;
            document.getElementById("editTitle").value = title;
            document.getElementById("editDescription").value = description;
            document.getElementById("editModal").classList.add("show");
        }

        function closeEditModal() {
            document.getElementById("editModal").classList.remove("show");
            editingTaskId = null;
        }

        async function saveEdit() {
            const title = document.getElementById("editTitle").value.trim();
            const description = document.getElementById("editDescription").value.trim();

            if (title === "") {
                alert("Title cannot be empty");
                return;
            }

            try {
                const res = await fetch(`/api/tasks/${editingTaskId}`, {
                    method: "PUT",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({title, description})
                });
                if (!res.ok) throw new Error("Failed to update task");
                closeEditModal();
                loadTasks();
            } catch (error) {
                console.error("Error updating task:", error);
                alert("Error updating task. Please try again.");
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById("taskInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                addTask();
            }
        });

        document.getElementById("editModal").addEventListener("click", function(event) {
            if (event.target === this) {
                closeEditModal();
            }
        });

        loadTasks();
    </script>
</body>
</html>
